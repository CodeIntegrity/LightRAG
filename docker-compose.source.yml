
services:
  lightrag:
    image: lightrag:source-dev
    build:
      context: .
      dockerfile: Dockerfile.cn
      cache_from:
        - type=local,src=.docker-buildx-cache
      cache_to:
        - type=local,dest=.docker-buildx-cache,mode=max
      args:
        BUN_IMAGE: oven/bun:1.3.6
        UV_IMAGE: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
        UV_BINARY_IMAGE: ghcr.io/astral-sh/uv:latest
        PYTHON_IMAGE: python:3.12-slim
        DEBIAN_MIRROR: https://mirrors.tuna.tsinghua.edu.cn/debian
        DEBIAN_SECURITY_MIRROR: https://mirrors.tuna.tsinghua.edu.cn/debian-security
        PYTHON_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        UV_DEFAULT_INDEX: https://pypi.tuna.tsinghua.edu.cn/simple
        BUN_REGISTRY: https://registry.npmmirror.com/
        RUSTUP_DIST_SERVER: https://rsproxy.cn
        RUSTUP_UPDATE_ROOT: https://rsproxy.cn/rustup
        CARGO_REGISTRY_INDEX: sparse+https://rsproxy.cn/index/
    ports:
      - "0.0.0.0:9621:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./config.ini:/app/config.ini
      - ./.env:/app/.env
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      HOST: "0.0.0.0"
      PORT: "9621"
