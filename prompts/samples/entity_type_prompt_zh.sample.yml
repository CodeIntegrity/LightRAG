    2023年版《大语言模型评测体系研究》综合了超过200篇同行评审论文的发现，并提出了一个名为LLMEval-Bench的新评测框架，旨在评估语言模型在多样化任务领域中的表现。该出版物由复旦大学自然语言处理实验室的赵明教授和钱雪博士共同撰写。

    LLMEval-Bench衡量三个关键指标：推理效率（从输入到输出的时间）、在未见过测试集上的回答准确率，以及计算成本（以GPU小时计）。初步结果表明，基于检索增强的方法在准确率上优于纯生成式方法15个百分点，同时在长文本任务上消耗的GPU小时减少了40%。
    ```

