    陈慧博士率领野外考察队深入四川大熊猫栖息地，旨在记录野生大熊猫的种群数量变化。团队采用了样线调查法——研究人员沿预设路径行走，在固定距离范围内记录每次动物目击——初步估计该调查区域内野生大熊猫数量已不足1800只。

    本次考察由国家野生动物保护协会资助，并产出了一份里程碑式的研究报告《西南山区大型哺乳动物种群动态》。陈慧指出，种群下降的主要原因是大规模基础设施建设导致栖息地碎片化，过去十年间该区域超过35%的原始竹林已被公路和城镇所取代。
    ```

