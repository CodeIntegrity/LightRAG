### 当 ENTITY_EXTRACTION_USE_JSON=false 时，此文件必须包含 entity_extraction_examples 部分
### 当 ENTITY_EXTRACTION_USE_JSON=true 时，此文件必须包含 entity_extraction_json_examples 部分

entity_types_guidance: |
  请将每个实体归类为以下类型之一。如果没有匹配的类型，则使用 `Other`。

  - Person: 人类个体，包括真实或虚构人物
  - Creature: 非人类生命体（动物、神话生物等）
  - Organization: 公司、机构、政府组织、团体
  - Location: 地理场所（城市、国家、建筑物、区域）
  - Event: 事件、事故、仪式、会议
  - Concept: 抽象概念、理论、原理、信念
  - Method: 流程、技术、算法、工作流
  - Content: 创作或信息作品（书籍、文章、电影、报告）
  - Data: 定量或结构化信息（统计数据、数据集、测量结果）
  - Artifact: 人造物理或数字对象（工具、软件、设备）
  - NaturalObject: 自然非生物对象（矿物、天体、化合物）
entity_extraction_examples:
  - |
    ---Entity Types---
    - Person: 人类个体，包括真实或虚构人物
    - Artifact: 人造物理或数字对象（工具、软件、设备）
    - Concept: 抽象概念、理论、原理、信念

    ---Input Text---
    ```
    李明攥紧拳头，挫败感在周婷专断的态度面前显得微不足道。正是这种暗流涌动的竞争让他保持警觉，他和张伟共同追求发现的信念，无形中成为对抗王刚那日益狭隘的控制与秩序理念的反叛。

    接着周婷做出了意想不到的举动。她在张伟身边停下脚步，以一种近乎敬畏的神情注视着那台设备。"如果能弄清楚这项技术..."周婷低声说道，声音比平时柔和了许多，"它可能改变我们所有人的处境。"

    之前的轻视似乎动摇了，取而代之的是对眼前之物分量的一丝勉强敬意。张伟抬起头，一瞬间，他们的目光与周婷相遇，一场无声的意志较量在紧绷的对峙中软化为一种微妙的缓和。

    这是一个微小的转变，几乎难以察觉，但李明看在眼里，暗自点了点头。他们每个人都因不同的缘由聚集到了这里。
    ```

    ---Output---
    entity{tuple_delimiter}李明{tuple_delimiter}Person{tuple_delimiter}李明是一个感受到挫败感并敏锐察觉其他角色之间互动态势的角色。
    entity{tuple_delimiter}周婷{tuple_delimiter}Person{tuple_delimiter}周婷展现出专断的自信，并在面对设备时流露出一丝敬畏，表明其态度发生了转变。
    entity{tuple_delimiter}张伟{tuple_delimiter}Person{tuple_delimiter}张伟致力于追求发现，并与周婷就设备进行了一次重要的互动。
    entity{tuple_delimiter}王刚{tuple_delimiter}Person{tuple_delimiter}王刚代表着控制与秩序的理念，影响着其他角色之间的互动。
    entity{tuple_delimiter}设备{tuple_delimiter}Artifact{tuple_delimiter}设备是故事的核心，具有改变局面的潜力，受到周婷的敬畏。
    entity{tuple_delimiter}发现{tuple_delimiter}Concept{tuple_delimiter}发现代表了张伟和李明共同追求知识的精神纽带，与王刚的控制型世界观形成对立。
    relation{tuple_delimiter}李明{tuple_delimiter}周婷{tuple_delimiter}权力博弈, 观察{tuple_delimiter}李明观察周婷的专断行为，并注意到她对设备态度的变化。
    relation{tuple_delimiter}李明{tuple_delimiter}张伟{tuple_delimiter}共同目标, 反叛{tuple_delimiter}李明和张伟共同追求发现，与王刚的理念形成对比。
    relation{tuple_delimiter}周婷{tuple_delimiter}张伟{tuple_delimiter}冲突化解, 相互尊重{tuple_delimiter}周婷与张伟就设备进行直接互动，达成了一个微妙的缓和与相互尊重。
    relation{tuple_delimiter}张伟{tuple_delimiter}王刚{tuple_delimiter}理念冲突, 反叛{tuple_delimiter}张伟对发现的执着是对王刚控制与秩序理念的反叛。
    relation{tuple_delimiter}周婷{tuple_delimiter}设备{tuple_delimiter}敬畏, 技术意义{tuple_delimiter}周婷对设备流露出敬畏之情，显示其重要性和潜在影响。
    {completion_delimiter}
